when:
  event: tag

steps:
  - name: build-push
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      registry: forge.fullbyte.de
      repo: forge.fullbyte.de/1bleim/portfolio
      tags: latest,${CI_COMMIT_TAG#v}
      platforms: linux/amd64,linux/arm64
      username: boneskewer69
      password:
        from_secret: registry_token
      labels:
        - org.opencontainers.image.authors=${CI_COMMIT_AUTHOR}
        - org.opencontainers.image.source=${CI_REPO_URL}/src/tag/${CI_COMMIT_TAG}
        - org.opencontainers.image.revision=${CI_COMMIT_SHA}
        - org.opencontainers.image.version=${CI_COMMIT_TAG#v}
